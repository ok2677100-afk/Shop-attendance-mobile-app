name: shop_attendance
description: Shop Employee Attendance System with Biometric and WiFi Geo-fencing
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Biometric (fingerprint / face)
  local_auth: ^2.3.0

  # WiFi SSID + local IP
  network_info_plus: ^6.0.0

  # Runtime permissions (location required for WiFi SSID on Android)
  permission_handler: ^11.3.0

  # QR code generation
  qr_flutter: ^4.1.0

  # Save image to Android gallery
  image_gallery_saver: ^2.0.3

  # Widget → image capture
  # (built-in via RenderRepaintBoundary — no extra package needed)

  # Date formatting
  intl: ^0.19.0

  # Persist admin SSID setting
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
