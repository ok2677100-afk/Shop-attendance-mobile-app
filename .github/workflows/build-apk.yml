name: Build Shop Attendance Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Create Android Project
        run: |
          if [ ! -d "android" ]; then
            flutter create .
          fi

      - name: Update Android Configuration
        run: |

          sed -i 's/version "1.8.22"/version "1.9.24"/g' android/settings.gradle || true
          sed -i "s/ext.kotlin_version = '1.8.22'/ext.kotlin_version = '1.9.24'/g" android/build.gradle || true

          sed -i 's/compileSdk = .*/compileSdk = 35/g' android/app/build.gradle || true
          sed -i 's/minSdk = .*/minSdk = 21/g' android/app/build.gradle || true
          sed -i 's/targetSdk = .*/targetSdk = 35/g' android/app/build.gradle || true

          sed -i 's/gradle-8.5-bin.zip/gradle-8.7-bin.zip/g' android/gradle/wrapper/gradle-wrapper.properties || true

      - name: Get Packages
        run: flutter pub get

      - name: Clean Project
        run: flutter clean

      - name: Build Release APK
        run: flutter build apk --release --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShopAttendance-APK
          path: build/app/outputs/flutter-apk/app-release.apk
