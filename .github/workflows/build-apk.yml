name: Build Shop Attendance Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-flutter-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      # — 1. Checkout repository ———————————————————
      - name: Checkout repository
        uses: actions/checkout@v4

      # — 2. Java Setup ————————————————————————————
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # — 3. Flutter Setup ——————————————————————————
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # — 4. Re-create Fresh Android Project ——————————
      - name: Re-create Android files to fix Embedding
        run: |
          # عارضی طور پر آپ کی فائلوں کو محفوظ کرنا
          mkdir backup_files
          cp pubspec.yaml backup_files/
          cp lib/main.dart backup_files/
          
          # پرانا آدھا ادھورا اینڈرائیڈ فولڈر ڈیلیٹ کرنا
          rm -rf android lib pubspec.yaml
          
          # بالکل نیا اور جدید اینڈرائیڈ پروجیکٹ بنانا
          flutter create . --project-name=shop_attendance_app --platforms=android

          
          # آپ کا اصل کوڈ اور سیٹنگز واپس اپنی جگہ رکھنا
          cp backup_files/pubspec.yaml ./
          cp backup_files/main.dart ./lib/main.dart
                    # کوٹلن کا ورژن اپڈیٹ کرنا تاکہ پیکیجز فیل نہ ہوں
          sed -i 's/id "org.jetbrains.kotlin.android" version .*/id "org.jetbrains.kotlin.android" version "1.9.22" apply false/' android/settings.gradle

          # پریمیم پرمیشنز کو اینڈرائیڈ فائل میں شامل کرنا
                    # پریمیم پرمیشنز کو اینڈرائیڈ فائل میں شامل کرنا
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>
              <uses-permission android:name="android.permission.CHANGE_WIFI_STATE"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.USE_BIOMETRIC"/>
              <uses-permission android:name="android.permission.USE_FINGERPRINT"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-feature android:name="android.hardware.fingerprint" android:required="false"/>

              <application
                  android:label="Shop Attendance"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:requestLegacyExternalStorage="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboardSize|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF
