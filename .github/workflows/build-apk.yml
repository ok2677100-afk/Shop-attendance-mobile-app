name: Build Shop Attendance Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-flutter-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      # — 1. Checkout repository ———————————————————
      - name: Checkout repository
        uses: actions/checkout@v4

      # — 2. Java Setup ————————————————————————————
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # — 3. Flutter Setup ——————————————————————————
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # — 4. Re-create Fresh Android Project ——————————
      - name: Re-create Android files to fix Embedding
        run: |
          mkdir backup_files
          cp pubspec.yaml backup_files/
          cp lib/main.dart backup_files/
          
          rm -rf android lib pubspec.yaml
          
          # بالکل نیا پروجیکٹ بنانا
          flutter create . --project-name=shop_attendance_app --platforms=android
          
          cp backup_files/pubspec.yaml ./
          cp backup_files/main.dart ./lib/main.dart
          
          # کوٹلن کا ورژن اپڈیٹ کرنا
          sed -i 's/id "org.jetbrains.kotlin.android" version .*/id "org.jetbrains.kotlin.android" version "1.9.22" apply false/' android/settings.gradle
          
          # مینی فیسٹ فائل میں ورژن 2 فورس کرنا
          sed -i '/<\/activity>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml

          # اینڈرائیڈ بلڈ فائل میں جا کر ورژن 35 کو جڑ سے بدل کر 34 کرنا
          sed -i 's/compileSdk.*/compileSdk = 34/g' android/app/build.gradle
          sed -i 's/targetSdk.*/targetSdk = 34/g' android/app/build.gradle

      # — 5. Get Packages ———————————————————————————
      - name: Flutter pub get
        run: flutter pub get

      # — 6. Build Release APK ——————————————————————
      - name: Build Release APK
        run: |
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk ./app-release.apk

      # — 7. Upload APK artifact ————————————————————
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShopAttendance-Flutter-APK
          path: app-release.apk
          retention-days: 30
